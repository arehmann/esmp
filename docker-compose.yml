name: esmp

services:

  neo4j:
    image: neo4j:2026.01.4
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-esmp-local-password}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL",
        "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-esmp-local-password} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c",
        "exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e 'GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q 'HTTP/1.1 200' <&3"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mysql:
    image: mysql:8.4
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-esmp-local-root}
      MYSQL_DATABASE: esmp
      MYSQL_USER: esmp
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-esmp-local-password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
        "-u", "esmp", "-p${MYSQL_PASSWORD:-esmp-local-password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  neo4j_data:
  qdrant_data:
  mysql_data:
