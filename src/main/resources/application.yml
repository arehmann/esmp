spring:
  application:
    name: esmp
  threads:
    virtual:
      enabled: true
  ai:
    embedding:
      transformer:
        tokenizer:
          options:
            padding: "true"
    mcp:
      server:
        name: esmp-mcp
        version: 1.0.0
        type: SYNC
        sse-endpoint: /mcp/sse
        sse-message-endpoint: /mcp/message
        capabilities:
          tool: true
          resource: false
          prompt: false
          completion: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/esmp}
    username: ${SPRING_DATASOURCE_USERNAME:esmp}
    password: ${SPRING_DATASOURCE_PASSWORD:esmp-local-password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  neo4j:
    uri: ${SPRING_NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${SPRING_NEO4J_AUTHENTICATION_USERNAME:neo4j}
      password: ${SPRING_NEO4J_AUTHENTICATION_PASSWORD:esmp-local-password}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

qdrant:
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_PORT:6334}

esmp:
  source:
    strategy: ${ESMP_SOURCE_STRATEGY:VOLUME_MOUNT}
    volume-mount-path: ${ESMP_SOURCE_VOLUME_MOUNT_PATH:/mnt/source}
    github-url: ${ESMP_SOURCE_GITHUB_URL:}
    github-token: ${ESMP_SOURCE_GITHUB_TOKEN:}
    clone-directory: ${ESMP_SOURCE_CLONE_DIRECTORY:/tmp/esmp-source-clone}
    branch: ${ESMP_SOURCE_BRANCH:main}
  mcp:
    context:
      max-tokens: 8000
    cache:
      dependency-cone-ttl-minutes: 5
      domain-terms-ttl-minutes: 10
      semantic-query-ttl-minutes: 3
      max-size: 500
  extraction:
    source-root: ""
    classpath-file: ""
    parallel-threshold: ${ESMP_EXTRACTION_PARALLEL_THRESHOLD:500}
    partition-size: ${ESMP_EXTRACTION_PARTITION_SIZE:200}
  migration:
    custom-mappings: {}
    recipe-book-path: ${ESMP_MIGRATION_RECIPE_BOOK_PATH:data/migration/vaadin-recipe-book.json}
    custom-recipe-book-path: ${ESMP_MIGRATION_CUSTOM_RECIPE_BOOK_PATH:}
    transitive:
      override-weight: 0.3
      own-calls-weight: 0.3
      binding-weight: 0.2
      component-weight: 0.2
      ai-assisted-threshold: 0.4
  vector:
    collection-name: code_chunks
    vector-dimension: 384
    batch-size: 64
  risk:
    weight:
      complexity: 0.4
      fan-in: 0.2
      fan-out: 0.2
      db-writes: 0.2
      domain-complexity: 0.24
      domain-fan-in: 0.12
      domain-fan-out: 0.12
      domain-db-writes: 0.12
      domain-criticality: 0.10
      security-sensitivity: 0.10
      financial-involvement: 0.10
      business-rule-density: 0.10
  rag:
    weight:
      vector-similarity: 0.40
      graph-proximity: 0.35
      risk-score: 0.25
  scheduling:
    weight:
      risk: 0.35
      dependency: 0.25
      frequency: 0.20
      complexity: 0.20
    git-window-days: 180

server:
  port: 8080
