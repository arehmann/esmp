spring:
  application:
    name: esmp
  threads:
    virtual:
      enabled: true
  ai:
    embedding:
      transformer:
        tokenizer:
          options:
            padding: "true"
  datasource:
    url: jdbc:mysql://localhost:3307/esmp
    username: esmp
    password: ${MYSQL_PASSWORD:esmp-local-password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: ${NEO4J_PASSWORD:esmp-local-password}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

qdrant:
  host: localhost
  port: 6334

esmp:
  extraction:
    source-root: ""
    classpath-file: ""
  vector:
    collection-name: code_chunks
    vector-dimension: 384
    batch-size: 64
  risk:
    weight:
      complexity: 0.4
      fan-in: 0.2
      fan-out: 0.2
      db-writes: 0.2
      domain-complexity: 0.24
      domain-fan-in: 0.12
      domain-fan-out: 0.12
      domain-db-writes: 0.12
      domain-criticality: 0.10
      security-sensitivity: 0.10
      financial-involvement: 0.10
      business-rule-density: 0.10
  rag:
    weight:
      vector-similarity: 0.40
      graph-proximity: 0.35
      risk-score: 0.25
  scheduling:
    weight:
      risk: 0.35
      dependency: 0.25
      frequency: 0.20
      complexity: 0.20
    git-window-days: 180

server:
  port: 8080
