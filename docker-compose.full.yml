name: esmp

services:

  neo4j:
    image: neo4j:2026.01.4
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-esmp-local-password}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL",
        "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-esmp-local-password} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c",
        "exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e 'GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q 'HTTP/1.1 200' <&3"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mysql:
    image: mysql:8.4
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-esmp-local-root}
      MYSQL_DATABASE: esmp
      MYSQL_USER: esmp
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-esmp-local-password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
        "-u", "esmp", "-p${MYSQL_PASSWORD:-esmp-local-password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}

  esmp-dashboard:
    build: ./esmp-dashboard
    ports:
      - "3001:3000"
    environment:
      ESMP_API_URL: http://esmp:8080
    depends_on:
      esmp:
        condition: service_healthy
    restart: unless-stopped

  esmp:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/esmp
      SPRING_DATASOURCE_USERNAME: esmp
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-esmp-local-password}
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${NEO4J_PASSWORD:-esmp-local-password}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      ESMP_SOURCE_STRATEGY: ${ESMP_SOURCE_STRATEGY:-VOLUME_MOUNT}
      ESMP_SOURCE_VOLUME_MOUNT_PATH: /mnt/source
      ESMP_SOURCE_GITHUB_URL: ${ESMP_SOURCE_GITHUB_URL:-}
      ESMP_SOURCE_GITHUB_TOKEN: ${ESMP_SOURCE_GITHUB_TOKEN:-}
      ESMP_SOURCE_CLONE_DIRECTORY: /data/esmp-source-clone
      ESMP_SOURCE_BRANCH: ${ESMP_SOURCE_BRANCH:-main}
    volumes:
      - ${SOURCE_ROOT:-.}:/mnt/source:ro
      - esmp_clone_data:/data/esmp-source-clone
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  neo4j_data:
  qdrant_data:
  mysql_data:
  prometheus_data:
  grafana_data:
  esmp_clone_data:
